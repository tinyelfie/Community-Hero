  <style>
      body { font-family: 'Corben', serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100dvh; }
      .leaflet-container { font-family: 'Corben', serif !important; font-weight: 400 !important; }
      option { color: #000 !important; background-color: #fff !important; }
      #app { flex: 1; }
      .glass-card {
          background: rgba(255, 255, 255, 0.7);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass-card {
          background: rgba(48, 49, 45, 0.6);
          border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .sakura-gradient, .sakura-dawn {
          background: linear-gradient(135deg, #7c535c 0%, #9b4053 100%);
      }
      .shine-effect:hover {
          position: relative;
          overflow: hidden;
      }
      .shine-effect:hover::after {
          content: '';
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
          transform: rotate(45deg);
          animation: shine 0.8s ease-in-out;
      }
      @keyframes shine {
          0% { transform: translateX(-100%) rotate(45deg); }
          100% { transform: translateX(100%) rotate(45deg); }
      }
      .custom-scroll::-webkit-scrollbar {
          width: 4px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
          background: #d4c2c4;
          border-radius: 10px;
      }
      .status-stepper { display: flex; align-items: center; padding: 16px 0; margin: 16px 0; border-top: 1px solid #E8E4D9; border-bottom: 1px solid #E8E4D9; }
      .step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
      .step-dot { width: 14px; height: 14px; border-radius: 50%; background: #E8E4D9; border: 2px solid #E8E4D9; transition: all 0.3s ease; }
      .step.active .step-dot { background: #FFCAD4; border-color: #FF8FA3; box-shadow: 0 0 0 3px rgba(255,143,163,0.2); }
      .step.completed .step-dot { background: #B7E4C7; border-color: #4CAF50; }
      .step-label { font-size: 11px; color: #888; white-space: nowrap; }
      .step.active .step-label { color: #425B46; font-weight: 600; }
      .step-line { flex: 1; height: 2px; background: #E8E4D9; margin: 0 4px; margin-bottom: 18px; }
      .step-line.completed { background: #B7E4C7; }
      
      .hotspot-glow {
          width: 16px;
          height: 16px;
          background-color: transparent;
          border: 2px solid #ff4d4d;
          border-radius: 50%;
          box-shadow: 0 0 10px 3px rgba(255, 77, 77, 0.6), inset 0 0 8px 2px rgba(255, 77, 77, 0.6);
      }
      
      @keyframes letter-jump {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
      }
      .hover-word {
          display: inline-block;
          white-space: pre;
      }
      .hover-letter {
          display: inline-block;
          transition: transform 0.2s;
      }
      .hover-word:hover .hover-letter {
          animation: letter-jump 0.4s ease-in-out forwards;
      }

      
      @media (pointer: fine) {
          * {
              cursor: url('https://cdn.cursors-4u.net/previews/light-pink-pointer-586da373-32.webp') 40 37, auto !important;
          }
          .page-home .cursor-spotlight {
              display: none !important;
          }
          .cursor-spotlight {
              position: fixed;
              top: 0;
              left: 0;
              width: 400px;
              height: 400px;
              border-radius: 50%;
              /* Darker pink spotlight for light mode to improve visibility */
              background: radial-gradient(circle, rgba(190, 80, 100, 0.25) 0%, rgba(190, 80, 100, 0) 70%);
              pointer-events: none;
              z-index: 9999;
              transform: translate(-50%, -50%);
              transition: width 0.3s, height 0.3s, background 0.3s;
              mix-blend-mode: multiply;
          }
          .dark .cursor-spotlight {
              background: radial-gradient(circle, rgba(255, 178, 189, 0.15) 0%, rgba(255, 178, 189, 0) 70%);
              mix-blend-mode: screen;
          }
          .cursor-spotlight.hovering {
              width: 300px;
              height: 300px;
              background: radial-gradient(circle, rgba(124, 83, 92, 0.4) 0%, rgba(124, 83, 92, 0) 70%);
          }
          .dark .cursor-spotlight.hovering {
              background: radial-gradient(circle, rgba(255, 217, 223, 0.2) 0%, rgba(255, 217, 223, 0) 70%);
          }
      }
